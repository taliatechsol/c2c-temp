<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JustHireMe — Core System Architecture</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap');

        :root {
            --bg: #fdfaf6;
            --line: rgba(0,0,0,0.08);
            --text-primary: #1a1a1a;
            --text-secondary: #555555;
            --text-dim: #999999;

            --blue: #d9e6ff; --blue-ink: #2b4c8c;
            --yellow: #fff0cc; --yellow-ink: #8c6d1f;
            --purple: #e9e1ff; --purple-ink: #4e3a8c;
            --green: #dcf1e3; --green-ink: #2d5c3f;
            --orange: #ffebd8; --orange-ink: #8c501f;
            --pink: #ffe1f0; --pink-ink: #8c2b5c;
            --teal: #e1f9f9; --teal-ink: #2b7c7c;

            --font-sans: 'Inter', system-ui, sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }

        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            color: var(--text-primary);
            font-family: var(--font-sans);
            overflow: hidden;
        }

        #viz-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        header {
            position: absolute; top: 32px; left: 32px; z-index: 10;
            display: flex; flex-direction: column; gap: 4px;
        }
        header h1 { margin: 0; font-size: 24px; font-weight: 700; letter-spacing: -0.5px; }
        header p { margin: 0; font-family: var(--font-mono); font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; color: var(--text-dim); }

        .controls {
            position: absolute; bottom: 32px; left: 50%; transform: translateX(-50%);
            background: #fff; border: 1px solid var(--line); padding: 8px;
            border-radius: 16px; display: flex; gap: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            z-index: 20;
        }
        .btn {
            border: none; background: transparent; padding: 8px 16px; border-radius: 10px;
            font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s;
            display: flex; align-items: center; gap: 8px; color: var(--text-secondary);
        }
        .btn:hover { background: #f5f5f5; color: #000; }
        .btn.active { background: #1a1a1a; color: #fff; }

        svg { width: 100%; height: 100%; cursor: grab; }
        svg:active { cursor: grabbing; }

        /* Node Styling */
        .node { transition: 0.3s; cursor: pointer; }
        .node rect.bg { stroke-width: 1; rx: 16; ry: 16; transition: 0.2s; }
        .node:hover rect.bg { stroke-opacity: 0.5; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.05)); }
        
        .node-title { font-weight: 700; font-size: 14px; }
        .node-label { font-family: var(--font-mono); font-size: 9px; text-transform: uppercase; letter-spacing: 0.5px; }
        .node-detail { font-size: 11px; opacity: 0.7; }

        /* Connections */
        .edge { stroke: #e0e0e0; stroke-width: 1.5; fill: none; transition: 0.3s; }
        .edge.active { stroke: #000; stroke-width: 2.5; stroke-dasharray: 4, 8; animation: flow 10s linear infinite; }
        @keyframes flow { to { stroke-dashoffset: -200; } }

        .packet { fill: #000; filter: drop-shadow(0 0 3px rgba(0,0,0,0.2)); }

        /* Tooltip */
        #tooltip {
            position: absolute; background: #1a1a1a; color: #fff;
            padding: 12px 16px; border-radius: 12px; font-size: 12px;
            pointer-events: none; opacity: 0; transition: 0.2s; z-index: 100;
            max-width: 280px; box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            line-height: 1.4;
        }

        .legend {
            position: absolute; top: 32px; right: 32px;
            background: #fff; border: 1px solid var(--line); border-radius: 16px;
            padding: 16px; display: flex; flex-direction: column; gap: 8px; font-size: 11px;
        }
        .legend-item { display: flex; align-items: center; gap: 10px; color: var(--text-secondary); }
        .dot { width: 8px; height: 8px; border-radius: 2px; }

    </style>
</head>
<body>

<div id="viz-container">
    <header>
        <h1>System Architecture</h1>
        <p>JustHireMe · Intelligence Pipeline</p>
    </header>

    <div class="legend">
        <div class="legend-item"><div class="dot" style="background:var(--blue)"></div> UI & Bridge</div>
        <div class="legend-item"><div class="dot" style="background:var(--green)"></div> Core Backend</div>
        <div class="legend-item"><div class="dot" style="background:var(--orange)"></div> Autonomous Agents</div>
        <div class="legend-item"><div class="dot" style="background:var(--teal)"></div> Embedded Storage</div>
    </div>

    <div class="controls">
        <button class="btn" id="btn-scan" onclick="simulate('scan')">Simulate Discovery Flow</button>
        <button class="btn" id="btn-apply" onclick="simulate('apply')">Simulate Application Flow</button>
        <button class="btn" id="btn-ingest" onclick="simulate('ingest')">Simulate Knowledge Flow</button>
        <button class="btn" onclick="location.reload()">Reset Map</button>
    </div>

    <svg id="svg-root" viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
        <defs>
            <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <path d="M0,0 L10,3.5 L0,7" fill="#e0e0e0" id="arrow-path" />
            </marker>
        </defs>
        <g id="links-layer"></g>
        <g id="packets-layer"></g>
        <g id="nodes-layer"></g>
    </svg>

    <div id="tooltip"></div>
</div>

<script>
    const NODES = [
        { id: 'ui', x: 200, y: 150, w: 200, h: 90, color: 'var(--purple)', ink: 'var(--purple-ink)', title: 'React Frontend', label: 'VITE / TS / TAILWIND', details: ['• Pipeline Kanban', '• Activity Stream', '• Profile Editor'], tip: 'Handles user interaction and displays live agent feedback via WebSockets.' },
        { id: 'tauri', x: 200, y: 320, w: 200, h: 90, color: 'var(--blue)', ink: 'var(--blue-ink)', title: 'Tauri Shell', label: 'RUST / IPC BRIDGE', details: ['• Sidecar Lifecycle', '• Port Discovery', '• Secure Key Storage'], tip: 'The parent process. Spawns the Python backend and manages system-level resources.' },
        
        { id: 'api', x: 500, y: 235, w: 200, h: 100, color: 'var(--green)', ink: 'var(--green-ink)', title: 'FastAPI Backend', label: 'PYTHON / UV / API', details: ['• REST Endpoints', '• WS Heartbeat', '• Task Scheduler'], tip: 'The central hub for data flow and agent communication.' },
        { id: 'graph', x: 500, y: 550, w: 200, h: 100, color: 'var(--green)', ink: 'var(--green-ink)', title: 'LangGraph Engine', label: 'STATE MACHINE', details: ['• DAG Orchestration', '• Loop Checkpoints', '• Interrupt Control'], tip: 'Coordinates agent sequences and handles Human-in-the-loop pauses (Sniper Mode).' },
        
        { id: 'scout', x: 850, y: 100, w: 180, h: 80, color: 'var(--orange)', ink: 'var(--orange-ink)', title: 'Scout Agent', label: 'DISCOVERY', details: ['• Apify LinkedIn', '• Local Playwright'], tip: 'Autonomous lead finding across job boards and social networks.' },
        { id: 'eval', x: 850, y: 220, w: 180, h: 80, color: 'var(--yellow)', ink: 'var(--yellow-ink)', title: 'Evaluator', label: 'GRAPHRAG SCORING', details: ['• Cypher Search', '• Vector Similarity'], tip: 'Scores leads by finding proof-of-work relationships in the knowledge brain.' },
        { id: 'gen', x: 850, y: 340, w: 180, h: 80, color: 'var(--orange)', ink: 'var(--orange-ink)', title: 'Generator', label: 'CONTENT TAILORING', details: ['• Resume Drafting', '• PDF Rendering'], tip: 'Creates job-specific application materials based on matched skills.' },
        { id: 'act', x: 850, y: 460, w: 180, h: 80, color: 'var(--pink)', ink: 'var(--pink-ink)', title: 'Actuator', label: 'DOM EXECUTION', details: ['• Form Filling', '• VLM Vision Fallback'], tip: 'Submits applications via Playwright, with Vision fallbacks for complex forms.' },
        { id: 'ing', x: 850, y: 580, w: 180, h: 80, color: 'var(--green)', ink: 'var(--green-ink)', title: 'Ingestor', label: 'KNOWLEDGE EXTRACTION', details: ['• PDF Parsing', '• Ontology Mapping'], tip: 'Parses resumes and profiles to populate the relational knowledge graph.' },
        
        { id: 'storage', x: 1100, y: 340, w: 160, h: 160, color: 'var(--teal)', ink: 'var(--teal-ink)', title: 'Storage Layer', label: 'MULTI-MODAL DB', details: ['• Kùzu (Graph)', '• LanceDB (Vector)', '• SQLite (CRM)'], tip: 'Hybrid local-first storage. Maintains your private career knowledge base.' }
    ];

    const LINKS = [
        { from: 'ui', to: 'tauri' }, { from: 'tauri', to: 'api' }, { from: 'ui', to: 'api' },
        { from: 'api', to: 'graph' }, { from: 'graph', to: 'scout' }, { from: 'graph', to: 'eval' },
        { from: 'graph', to: 'gen' }, { from: 'graph', to: 'act' }, { from: 'graph', to: 'ing' },
        { from: 'scout', to: 'api' }, { from: 'eval', to: 'storage' }, { from: 'ing', to: 'storage' }, { from: 'act', to: 'storage' }
    ];

    const tooltip = document.getElementById('tooltip');

    function init() {
        const nodesL = document.getElementById('nodes-layer');
        const linksL = document.getElementById('links-layer');

        LINKS.forEach(l => {
            const f = NODES.find(n => n.id === l.from);
            const t = NODES.find(n => n.id === l.to);
            if (!f || !t) return;
            const line = document.createElementNS('http://www.w3.org/2000/svg', 'path');
            const d = `M ${f.x} ${f.y} L ${t.x} ${t.y}`;
            line.setAttribute('d', d);
            line.setAttribute('class', 'edge');
            line.setAttribute('id', `edge-${l.from}-${l.to}`);
            line.setAttribute('marker-end', 'url(#arrow)');
            linksL.appendChild(line);
        });

        NODES.forEach(n => {
            const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
            g.setAttribute('class', 'node');
            g.setAttribute('transform', `translate(${n.x}, ${n.y})`);
            
            g.onmouseenter = (e) => {
                tooltip.style.opacity = 1;
                tooltip.innerHTML = `<strong>${n.title}</strong><br>${n.tip}`;
                moveTooltip(e);
            };
            g.onmousemove = moveTooltip;
            g.onmouseleave = () => tooltip.style.opacity = 0;

            const rect = document.createElementNS('http://www.w3.org/2000/svg', 'rect');
            rect.setAttribute('x', -n.w/2); rect.setAttribute('y', -n.h/2);
            rect.setAttribute('width', n.w); rect.setAttribute('height', n.h);
            rect.setAttribute('class', 'bg');
            rect.setAttribute('fill', n.color);
            rect.setAttribute('stroke', n.ink || '#000');
            rect.setAttribute('stroke-opacity', '0.1');

            const title = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            title.setAttribute('x', -n.w/2 + 16); title.setAttribute('y', -n.h/2 + 24);
            title.setAttribute('class', 'node-title');
            title.textContent = n.title;

            const label = document.createElementNS('http://www.w3.org/2000/svg', 'text');
            label.setAttribute('x', -n.w/2 + 16); label.setAttribute('y', -n.h/2 + 38);
            label.setAttribute('class', 'node-label');
            label.setAttribute('fill', 'rgba(0,0,0,0.4)');
            label.textContent = n.label;

            n.details.forEach((line, i) => {
                const d = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                d.setAttribute('x', -n.w/2 + 16); d.setAttribute('y', -n.h/2 + 60 + (i*14));
                d.setAttribute('class', 'node-detail');
                d.textContent = line;
                g.appendChild(d);
            });

            g.appendChild(rect); g.appendChild(title); g.appendChild(label);
            nodesL.appendChild(g);
        });
    }

    function moveTooltip(e) {
        tooltip.style.left = (e.pageX + 20) + 'px';
        tooltip.style.top = (e.pageY + 20) + 'px';
    }

    function reset() {
        document.querySelectorAll('.edge').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.btn').forEach(b => b.classList.remove('active'));
    }

    async function simulate(type) {
        reset();
        document.getElementById(`btn-${type}`).classList.add('active');
        const paths = {
            scan: [['ui','api'], ['api','graph'], ['graph','scout'], ['scout','api'], ['graph','eval'], ['eval','storage']],
            apply: [['ui','api'], ['api','graph'], ['graph','gen'], ['graph','act'], ['act','storage']],
            ingest: [['ui','api'], ['api','graph'], ['graph','ing'], ['ing','storage']]
        };

        for (const [from, to] of paths[type]) {
            const edge = document.getElementById(`edge-${from}-${to}`);
            if (edge) {
                edge.classList.add('active');
                
                const f = NODES.find(n => n.id === from);
                const t = NODES.find(n => n.id === to);
                const p = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                p.setAttribute('r', '4'); p.setAttribute('class', 'packet');
                document.getElementById('packets-layer').appendChild(p);
                
                const anim = p.animate([{cx: f.x, cy: f.y}, {cx: t.x, cy: t.y}], {duration: 600, easing: 'ease-in-out'});
                await anim.finished;
                p.remove();
            }
        }
    }

    init();
</script>
</body>
</html>
